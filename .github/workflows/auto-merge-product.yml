name: Auto Merge Product Submission

on:
  workflow_run:
    workflows: ['Validate Product Submission']
    types: [completed]

permissions:
  contents: write
  pull-requests: write

jobs:
  auto-merge:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    steps:
      - name: Merge validated product PRs
        uses: actions/github-script@v7
        with:
          script: |
            const run = context.payload.workflow_run;
            const linkedPrs = run.pull_requests || [];

            if (linkedPrs.length === 0) {
              core.info('No pull request is linked to this workflow run.');
              return;
            }

            const allowedAssetExt = new Set(['.png', '.jpg', '.jpeg', '.webp', '.gif', '.svg', '.avif']);

            function isAllowedProductFile(filename) {
              if (!filename.startsWith('products/')) return { ok: false, reason: 'outside products/' };
              const parts = filename.split('/');
              if (parts.length < 3 || !parts[1]) return { ok: false, reason: 'invalid product path' };
              const relativePath = parts.slice(2).join('/');
              if (!relativePath || relativePath.endsWith('/')) return { ok: false, reason: 'invalid file path' };
              if (relativePath === 'product.json') return { ok: true, productDir: parts[1], isProductJson: true };

              const lower = relativePath.toLowerCase();
              const hasAllowedExt = [...allowedAssetExt].some((ext) => lower.endsWith(ext));
              if (!hasAllowedExt) return { ok: false, reason: 'unsupported file type' };
              return { ok: true, productDir: parts[1], isProductJson: false };
            }

            for (const linked of linkedPrs) {
              const prNumber = linked.number;
              core.info(`Processing PR #${prNumber}`);

              const { data: pr } = await github.rest.pulls.get({
                owner: context.repo.owner,
                repo: context.repo.repo,
                pull_number: prNumber
              });

              if (pr.state !== 'open') {
                core.info(`PR #${prNumber} is not open, skipping.`);
                continue;
              }

              if (pr.draft) {
                core.info(`PR #${prNumber} is draft, skipping.`);
                continue;
              }

              if (pr.base.ref !== 'main') {
                core.info(`PR #${prNumber} targets ${pr.base.ref}, only main is auto-merged.`);
                continue;
              }

              if (pr.head.sha !== run.head_sha) {
                core.info(`PR #${prNumber} head SHA changed since validation run, skipping this run.`);
                continue;
              }

              const files = await github.paginate(github.rest.pulls.listFiles, {
                owner: context.repo.owner,
                repo: context.repo.repo,
                pull_number: prNumber,
                per_page: 100
              });

              if (files.length === 0) {
                core.info(`PR #${prNumber} has no changed files, skipping.`);
                continue;
              }

              const productDirs = new Set();
              const invalidFiles = [];
              let hasProductJson = false;

              for (const file of files) {
                if (file.status !== 'added' && file.status !== 'modified') {
                  invalidFiles.push(`${file.filename} (${file.status} not allowed)`);
                  continue;
                }

                const check = isAllowedProductFile(file.filename);
                if (!check.ok) {
                  invalidFiles.push(`${file.filename} (${check.reason})`);
                  continue;
                }

                productDirs.add(check.productDir);
                if (check.isProductJson) hasProductJson = true;
              }

              if (productDirs.size !== 1 || !hasProductJson || invalidFiles.length > 0) {
                core.info(`PR #${prNumber} failed auto-merge guard.`);
                if (productDirs.size !== 1) {
                  core.info(`Expected 1 product directory, got ${productDirs.size}.`);
                }
                if (!hasProductJson) {
                  core.info('product.json is missing from changed files.');
                }
                if (invalidFiles.length > 0) {
                  core.info(`Invalid files: ${invalidFiles.join(', ')}`);
                }
                continue;
              }

              const productDir = [...productDirs][0];

              try {
                await github.rest.pulls.merge({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  pull_number: prNumber,
                  merge_method: 'squash',
                  commit_title: `feat(vibeship): add product ${productDir}`,
                  commit_message: 'Auto-merged after Validate Product Submission workflow passed.'
                });
                core.info(`PR #${prNumber} merged successfully.`);
              } catch (error) {
                core.warning(`Failed to merge PR #${prNumber}: ${error.message}`);
              }
            }
